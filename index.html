<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habilitación Oficial - CampusLA Hub</title>
    <style>
        :root { --azul: #002d55; --oro: #e6b800; --gris: #f4f7f9; --verde: #25d366; }
        
        /* Ajuste base para que no se vea gigante en PC ni pequeño en móvil */
        body { font-family: 'Garamond', serif; background-color: var(--gris); margin: 0; padding: 20px 10px; color: #333; line-height: 1.6; }
        
        .doc-container { max-width: 850px; background: #fff; margin: 0 auto; border: 1px solid #ccc; box-shadow: 0 0 30px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        
        .header { padding: 30px 20px; text-align: center; border-bottom: 4px solid var(--azul); }
        .header img { max-width: 250px; width: 100%; height: auto; }
        
        .content { padding: 30px 20px; } /* Bajamos el padding para que en móvil no se pierda espacio */
        
        h1 { font-size: 1.5rem; text-align: center; color: var(--azul); }
        h2 { font-family: Arial; color: var(--azul); text-transform: uppercase; font-size: 1.1rem; border-left: 5px solid var(--oro); padding-left: 15px; margin-top: 30px; }

        /* GRID RESPONSIVO: 3 columnas en PC, 1 en móvil */
        .brand-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 25px 0; }
        .brand-item { background: #f9f9f9; padding: 10px; text-align: center; border: 1px solid #ddd; font-family: Arial; font-size: 0.7rem; font-weight: bold; }

        /* SELLO RESPONSIVO */
        .award-box { position: relative; margin: 40px 0; text-align: center; padding: 40px 15px; border: 5px double var(--azul); background: #fffdf5; }
        .rosette { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: var(--oro); border-radius: 50%; border: 3px solid #fff; }
        .rosette::after { content: "✓"; color: #fff; font-size: 2rem; line-height: 60px; font-weight: bold; }
        
        .benefits-box { background: var(--azul); color: white; padding: 25px; margin: 25px 0; border-radius: 5px; }
        .benefits-box ul { list-style: none; padding: 0; }
        .benefits-box li { margin-bottom: 10px; padding-left: 25px; position: relative; font-family: Arial; font-size: 0.9rem; }
        .benefits-box li::before { content: "★"; position: absolute; left: 0; color: var(--oro); }

        /* UTILIDAD RESPONSIVA: 2 columnas en PC, 1 en móvil */
        .utility-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
        .utility-item { padding: 15px; background: #eef2f7; border-radius: 5px; font-size: 0.85rem; }

        /* BOTONES AJUSTADOS */
        .cta-section { text-align: center; margin-top: 40px; padding: 20px; background: #f8f9fa; border: 1px solid #ddd; }
        .btn-action { display: block; margin: 10px auto; padding: 15px; width: 90%; text-decoration: none; font-weight: bold; font-family: Arial; border-radius: 5px; font-size: 1rem; }
        .btn-mail { background: var(--azul); color: white; }
        .btn-whatsapp { background: var(--verde); color: white; }
        
        .footer { padding: 20px; text-align: center; font-size: 0.75rem; color: #888; border-top: 1px solid #eee; }

        /* MEDIA QUERIES PARA MÓVIL */
        @media (max-width: 600px) {
            .content { padding: 20px 15px; }
            h1 { font-size: 1.3rem; }
            h2 { font-size: 1rem; }
            .brand-grid { grid-template-columns: repeat(2, 1fr); } /* 2 logos por fila en móvil */
            .utility-grid { grid-template-columns: 1fr; } /* 1 solo bloque por fila */
            .btn-action { width: 100%; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="doc-container">
        <div class="header">
            <img src="logocampus.jpg" alt="CampusLA Logo">
            <p style="font-family: Arial; font-weight: bold; color: var(--azul); margin-top: 10px; font-size: 0.85rem;">CampusLA - Hub de Certificación Internacional - Sede Boyacá</p>
            <a href="https://campusla.github.io/hub-campusla-branding/" target="_blank" style="display: inline-block; margin-top: 10px; padding: 8px 20px; background: var(--azul); color: #fff; text-decoration: none; font-family: Arial; font-size: 0.7rem; border-radius: 50px; font-weight: bold; text-transform: uppercase;">QUIÉNES SOMOS</a>
        </div>

        <div class="content">
            <h1>Habilitación Institucional CampusLA</h1>
            <div class="cta-section">
                <a href="mailto:eatramites1@gmail.com?subject=HABILITACIÓN%20ACEPTADA&body=Confirmamos%20habilitación..." class="btn-action btn-mail">OFICIALIZAR POR CORREO</a>
                <a href="https://wa.me/573144365569?text=Hola%20Marty..." class="btn-action btn-whatsapp">INFO POR WHATSAPP</a>
            </div>
        </div>
        
        <div class="footer">
            Vidi midi vici | Ad aspera ad astra | If there is a will there is a way.
        </div>
    </div>
</body>
</html>
